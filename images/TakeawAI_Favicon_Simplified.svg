<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="TakeawAI icon">
  <defs>
    <linearGradient id="bagBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F4F8A"/>
      <stop offset="100%" stop-color="#16315A"/>
    </linearGradient>
    <linearGradient id="bagSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DB8C7"/>
      <stop offset="100%" stop-color="#1F8A99"/>
    </linearGradient>
  </defs>

  <!-- Handles -->
  <path d="M70 56 q15 -28 30 0" fill="none" stroke="#3DB8C7" stroke-width="6" stroke-linecap="round"/>
  <path d="M115 56 q15 -28 30 0" fill="none" stroke="#3DB8C7" stroke-width="6" stroke-linecap="round"/>

  <!-- Side gusset -->
  <path d="M40 60 L52 50 L52 178 L40 188 Z" fill="url(#bagSide)"/>

  <!-- Top flap shadow -->
  <path d="M52 50 L168 50 L172 60 L52 60 Z" fill="#0F2342" opacity="0.5"/>

  <!-- Bag body -->
  <path d="M52 60 L172 60 L168 188 L40 188 Z" fill="url(#bagBody)"/>

  <!-- Lightbulb (circuit-style) -->
  <g stroke="#3DE0EC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bulb outline -->
    <path d="M106 88 a26 26 0 0 0 -12 50 v8 h24 v-8 a26 26 0 0 0 -12 -50 Z"/>
    <!-- Screw base -->
    <line x1="96" y1="152" x2="116" y2="152"/>
    <line x1="98" y1="158" x2="114" y2="158"/>
    <line x1="100" y1="164" x2="112" y2="164"/>
    <!-- Filament / circuitry tree -->
    <line x1="106" y1="146" x2="106" y2="118"/>
    <line x1="106" y1="132" x2="94" y2="120"/>
    <line x1="106" y1="132" x2="118" y2="120"/>
    <line x1="106" y1="124" x2="100" y2="116"/>
    <line x1="106" y1="124" x2="112" y2="116"/>
  </g>
  <g fill="#3DE0EC">
    <circle cx="106" cy="118" r="3"/>
    <circle cx="94" cy="120" r="2.5"/>
    <circle cx="118" cy="120" r="2.5"/>
    <circle cx="100" cy="116" r="2"/>
    <circle cx="112" cy="116" r="2"/>
  </g>
